<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scratch Translator</title>
    <meta name="color-scheme" content="dark light" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Slightly nicer default font stack */
      html {
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji",
          "Segoe UI Emoji";
        font-size: 17px; /* global bump */
      }
      .glass { background: rgba(255,255,255,0.09); backdrop-filter: blur(12px); }
      .ring-soft { box-shadow: 0 0 0 1px rgba(255,255,255,0.14) inset; }
    </style>
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-50">
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
      <div class="absolute -top-24 -left-24 h-[28rem] w-[28rem] rounded-full bg-cyan-400/30 blur-3xl"></div>
      <div class="absolute top-16 -right-24 h-[28rem] w-[28rem] rounded-full bg-fuchsia-400/30 blur-3xl"></div>
      <div class="absolute bottom-0 left-1/4 h-[28rem] w-[28rem] rounded-full bg-indigo-400/25 blur-3xl"></div>
    </div>

    <main class="relative mx-auto max-w-6xl px-4 py-10 sm:px-6 lg:px-8">
      <header class="mb-8 flex flex-col gap-3 sm:flex-row sm:items-end sm:justify-between">
        <div>
          <h1 class="text-4xl font-semibold tracking-tight">Scratch Translator</h1>
          <p class="mt-2 text-base text-slate-200/90">
            From-scratch Seq2Seq + Attention demo (English → French/Spanish/German).
          </p>
        </div>
        <div class="flex items-center gap-2 text-sm text-slate-200/90">
          <span class="inline-flex items-center gap-2 rounded-full glass ring-soft px-3 py-1">
            <span class="h-2 w-2 rounded-full bg-emerald-400" id="healthDot"></span>
            <span id="healthText">Checking…</span>
          </span>
        </div>
      </header>

      <section class="grid gap-6 lg:grid-cols-2">
        <div class="rounded-2xl glass ring-soft p-5 sm:p-6">
          <div class="flex items-center justify-between gap-4">
            <h2 class="text-base font-semibold text-slate-50">Translate</h2>
            <div class="text-sm text-slate-100/70">
              <span class="hidden sm:inline">⌘/Ctrl + Enter</span>
            </div>
          </div>

          <label class="mt-4 block">
            <span class="text-sm text-slate-100/80">Target language</span>
            <select
              id="to"
              class="mt-1 w-full rounded-xl bg-slate-950/50 px-3 py-2 text-base ring-1 ring-white/15 outline-none focus:ring-2 focus:ring-cyan-300/70"
            >
              <option value="fr" selected>French</option>
              <option value="es">Spanish</option>
              <option value="de">German</option>
            </select>
          </label>

          <textarea
            id="inputText"
            class="mt-4 h-64 w-full resize-none rounded-xl bg-slate-950/50 px-4 py-3 text-base text-slate-50 outline-none ring-1 ring-white/15 focus:ring-2 focus:ring-fuchsia-300/70"
            placeholder="Type or paste English text…"
          ></textarea>

          <div class="mt-5 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
            <div class="flex gap-2">
              <button
                id="translateBtn"
                class="inline-flex items-center justify-center rounded-xl bg-fuchsia-500 px-5 py-2.5 text-base font-semibold text-white shadow-lg shadow-fuchsia-500/25 hover:bg-fuchsia-400 focus:outline-none focus:ring-2 focus:ring-fuchsia-200/70 disabled:opacity-60"
              >
                Translate
              </button>
              <button
                id="clearBtn"
                class="inline-flex items-center justify-center rounded-xl bg-slate-800/70 px-5 py-2.5 text-base font-semibold text-slate-50 ring-1 ring-white/15 hover:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-white/25"
              >
                Clear
              </button>
            </div>
            <div id="status" class="text-sm text-slate-100/80"></div>
          </div>
        </div>

        <div class="rounded-2xl glass ring-soft p-5 sm:p-6">
          <div class="flex items-center justify-between">
            <h2 class="text-base font-semibold text-slate-50">Result</h2>
            <button
              id="copyBtn"
              class="rounded-xl bg-cyan-500/25 px-4 py-2 text-sm font-semibold text-cyan-50 ring-1 ring-cyan-300/30 hover:bg-cyan-500/35 focus:outline-none focus:ring-2 focus:ring-cyan-200/60"
            >
              Copy
            </button>
          </div>

          <div
            id="outputText"
            class="mt-3 min-h-[14rem] whitespace-pre-wrap rounded-xl bg-slate-950/50 px-4 py-3 text-base text-slate-50 ring-1 ring-white/15"
          ></div>

          <div class="mt-4 rounded-xl bg-slate-950/35 px-4 py-3 ring-1 ring-white/15">
            <div class="text-sm font-semibold text-slate-50">Model</div>
            <div id="meta" class="mt-1 text-sm text-slate-100/80"></div>
          </div>
        </div>
      </section>

      <footer class="mt-10 text-center text-sm text-slate-100/60">
        Local demo UI • No external services • Runs entirely on your machine
      </footer>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
